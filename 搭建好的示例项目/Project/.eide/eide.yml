version: "4.1"
name: GD32f450
type: ARM
deviceName: null
packDir: null
srcDirs: []
virtualFolder:
  name: <virtual_root>
  files: []
  folders:
    - name: User
      files:
        - path: ../User/gd32f4xx_it.c
        - path: ../User/main.c
        - path: ../User/systick.c
        - path: ../User/usart.c
        - path: ../User/bsp_dac.c
      folders: []
    - name: Firmware
      files:
        - path: ../Firmware/GD32F4xx_standard_peripheral/Source/gd32f4xx_gpio.c
        - path: ../Firmware/GD32F4xx_standard_peripheral/Source/gd32f4xx_rcu.c
        - path: ../Firmware/GD32F4xx_standard_peripheral/Source/gd32f4xx_misc.c
        - path: ../Firmware/GD32F4xx_standard_peripheral/Source/gd32f4xx_usart.c
        - path: ../Firmware/GD32F4xx_standard_peripheral/Source/gd32f4xx_dac.c
      folders: []
    - name: CMSIS
      files:
        - path: ../Firmware/CMSIS/GD/GD32F4xx/Source/ARM/startup_gd32f450_470.s
        - path: ../Firmware/CMSIS/GD/GD32F4xx/Source/system_gd32f4xx.c
      folders: []
    - name: Doc
      files:
        - path: ../Doc/readme.txt
      folders: []
    - name: Hardware
      files: []
      folders: []
    - name: App
      files: []
      folders: []
dependenceList: []
outDir: build
miscInfo: {}
targets:
  Target 1:
    cppPreprocessAttrs:
      defineList:
        - USE_STDPERIPH_DRIVER
        - GD32F450
      incList:
        - ../User
        - ../Firmware/CMSIS
        - ../Firmware/CMSIS/GD/GD32F4xx/Include
        - ../Firmware/GD32F4xx_standard_peripheral/Include
        - .cmsis/include
        - RTE/_Target 1
      libList: []
    excludeList: []
    settings:
      debugger: cortex-debug
    toolchain: AC5
    toolchainConfigMap:
      AC5:
        archExtensions: ""
        cpuType: Cortex-M4
        floatingPointHardware: single
        options:
          version: 4
          afterBuildTasks: []
          asm-compiler:
            defines: []
          beforeBuildTasks: []
          c/cpp-compiler:
            CXX_FLAGS: --diag_suppress=1 --diag_suppress=1295
            C_FLAGS: --diag_suppress=1 --diag_suppress=1295
            c99-mode: true
            one-elf-section-per-function: true
            optimization: level-0
            warnings: all-warnings
          global:
            output-debug-info: enable
            use-microLIB: true
          linker:
            $outputTaskExcludes:
              - .bin
            output-format: elf
            ro-base: "0x08000000"
            rw-base: "0x20000000"
            xo-base: ""
        scatterFilePath: ""
        storageLayout:
          RAM:
            - id: 1
              isChecked: false
              mem:
                size: "0x0"
                startAddr: "0x0"
              noInit: false
              tag: RAM
            - id: 2
              isChecked: false
              mem:
                size: "0x0"
                startAddr: "0x0"
              noInit: false
              tag: RAM
            - id: 3
              isChecked: false
              mem:
                size: "0x0"
                startAddr: "0x0"
              noInit: false
              tag: RAM
            - id: 1
              isChecked: true
              mem:
                size: "0x70000"
                startAddr: "0x20000000"
              noInit: false
              tag: IRAM
            - id: 2
              isChecked: false
              mem:
                size: "0x10000"
                startAddr: "0x10000000"
              noInit: false
              tag: IRAM
          ROM:
            - id: 1
              isChecked: false
              isStartup: false
              mem:
                size: "0x0"
                startAddr: "0x0"
              tag: ROM
            - id: 2
              isChecked: false
              isStartup: false
              mem:
                size: "0x0"
                startAddr: "0x0"
              tag: ROM
            - id: 3
              isChecked: false
              isStartup: false
              mem:
                size: "0x0"
                startAddr: "0x0"
              tag: ROM
            - id: 1
              isChecked: true
              isStartup: true
              mem:
                size: "0x100000"
                startAddr: "0x8000000"
              tag: IROM
            - id: 2
              isChecked: false
              isStartup: false
              mem:
                size: "0x0"
                startAddr: "0x0"
              tag: IROM
        useCustomScatterFile: true
    uploadConfigMap:
      JLink:
        baseAddr: ""
        bin: ""
        cpuInfo:
          cpuName: "null"
          vendor: "null"
        otherCmds: ""
        proType: 1
        speed: 8000
    uploader: JLink
